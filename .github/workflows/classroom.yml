name: GitHub Classroom Workflow

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.is_template }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # --- Ejercicio 1 ---
      - name: "Ej01 - L-value y R-value: variables como contenedores"
        id: ej01
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej01 - L-value y R-value: variables como contenedores"
          setup-command: npm install
          command: npx vitest run tests/ej01.test.ts
          timeout: 10
          max-score: 20

      # --- Ejercicio 2 ---
      - name: "Ej02 - Binding de tipos: tipado estático y coerciones"
        id: ej02
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej02 - Binding de tipos: tipado estático y coerciones"
          setup-command: npm install
          command: npx vitest run tests/ej02.test.ts
          timeout: 10
          max-score: 20

      # --- Ejercicio 3 ---
      - name: Ej03 - Binding de almacenamiento
        id: ej03
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ej03 — Binding de almacenamiento
          setup-command: npm install
          command: npx vitest run tests/ej03.test.ts
          timeout: 10
          max-score: 25

      # --- Ejercicio 4 ---
      - name: Ej04 - Ambito estatico
        id: ej04
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ej04 — Ambito estatico
          setup-command: npm install
          command: npx vitest run tests/ej04.test.ts
          timeout: 10
          max-score: 20

      # --- Ejercicio 5 ---
      - name: Ej05 - Errores de binding y ambito
        id: ej05
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ej05 — Errores de binding y ambito
          setup-command: npm install
          command: npx vitest run tests/ej05.test.ts
          timeout: 10
          max-score: 15

      # --- Reporter final ---
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          EJ01_RESULTS: "${{steps.ej01.outputs.result}}"
          EJ02_RESULTS: "${{steps.ej02.outputs.result}}"
          EJ03_RESULTS: "${{steps.ej03.outputs.result}}"
          EJ04_RESULTS: "${{steps.ej04.outputs.result}}"
          EJ05_RESULTS: "${{steps.ej05.outputs.result}}"
        with:
          runners: ej01,ej02,ej03,ej04,ej05
